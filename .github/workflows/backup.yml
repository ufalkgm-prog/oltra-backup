name: Backup to oltra-backup

on:
  push:
    branches: [main]

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Sync to oltra-backup
        env:
          GH_TOKEN: ${{ secrets.BACKUP_TOKEN }}
        run: |
          gh repo sync ufalkgm-prog/oltra-backup --source ufalkgm-prog/oltra-beta --branch main --force
