name: Backup to oltra-backup

on:
  push:
    branches: [main]

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to oltra-backup
        env:
          BACKUP_TOKEN: ${{ secrets.BACKUP_TOKEN }}
        run: |
          ENCODED=$(echo -n "x-access-token:${BACKUP_TOKEN}" | base64 --wrap=0)
          git remote add backup https://github.com/ufalkgm-prog/oltra-backup.git
          git config --local "http.https://github.com/ufalkgm-prog/oltra-backup.git/.extraheader" "AUTHORIZATION: basic ${ENCODED}"
          git push backup main --force
