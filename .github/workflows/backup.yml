name: Backup to oltra-backup

on:
  push:
    branches: [main]

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to oltra-backup
        env:
          BACKUP_TOKEN: ${{ secrets.BACKUP_TOKEN }}
        run: |
          git config --global --unset-all "http.https://github.com/.extraheader" || true
          git remote add backup https://ufalkgm-prog:${BACKUP_TOKEN}@github.com/ufalkgm-prog/oltra-backup.git
          git push backup main --force
