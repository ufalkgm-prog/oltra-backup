name: Backup to oltra-backup

on:
  push:
    branches: [main]

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to oltra-backup
        env:
          GH_TOKEN: ${{ secrets.BACKUP_TOKEN }}
        run: |
          git remote add backup https://github.com/ufalkgm-prog/oltra-backup.git
          git -c http.extraheader="Authorization: Bearer ${GH_TOKEN}" push backup main --force
